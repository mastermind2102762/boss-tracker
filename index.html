<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boss Tracker — MuOnline</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c10;--surface:#111318;--border:#2a2d36;--accent:#c8a84b;--text:#e8e6e0;--muted:#6b6f7a;--danger:#e05252;--success:#52c878;--warning:#e09652;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;padding:1.5rem 1rem;}
header{text-align:center;margin-bottom:1.5rem;}
.logo{font-size:11px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;margin-bottom:6px;}
h1{font-size:28px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.divider{width:50px;height:2px;background:var(--accent);margin:10px auto;}
.server-time{font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--accent);letter-spacing:3px;}

.layout{display:grid;grid-template-columns:185px 210px 1fr;gap:14px;align-items:start;}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:14px;}
.panel:last-child{margin-bottom:0;}
.ptitle{font-size:10px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}

/* events */
.ev-item{padding:5px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.ev-item:last-child{border-bottom:none;}
.ev-name{font-size:12px;font-weight:600;text-transform:uppercase;flex:1;}
.ev-timer{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted);white-space:nowrap;}
.ev-timer.soon{color:var(--warning);}
.ev-timer.open{color:var(--success);animation:pulse 1s infinite;}
.notif-btn{background:transparent;border:1px solid var(--border);border-radius:3px;width:20px;height:20px;cursor:pointer;font-size:11px;flex-shrink:0;transition:all 0.15s;color:var(--muted);}
.notif-btn.on{border-color:var(--accent);color:var(--accent);}

/* bosses */
.bgroup{margin-bottom:10px;}
.bgroup:last-child{margin-bottom:0;}
.bgroup-name{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;padding-left:4px;}
.bitem{padding:5px 8px;margin-bottom:3px;background:var(--bg);border:1px solid var(--border);border-radius:3px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;position:relative;overflow:hidden;transition:border-color 0.15s;}
.bitem::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--border);transition:background 0.3s;}
.bitem.active::before{background:var(--danger);}
.bitem.ready::before{background:var(--success);}
.bitem:hover{border-color:var(--accent);}
.bitem-name{font-size:12px;font-weight:600;text-transform:uppercase;}
.bitem-timer{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted);}
.bitem-timer.active{color:var(--danger);}
.bitem-timer.ready{color:var(--success);animation:pulse 1s infinite;}
.bitem-sub{font-size:9px;color:var(--muted);}

/* arena table */
.arena-table{width:100%;border-collapse:collapse;font-size:11px;}
.arena-table th{font-size:10px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;padding:5px 5px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap;}
.arena-table th.name-col{text-align:left;min-width:130px;}
.arena-table td{padding:3px 5px;border-bottom:1px solid var(--border);vertical-align:middle;}
.arena-table tr:last-child td{border-bottom:none;}
.aname{font-size:12px;font-weight:600;text-transform:uppercase;}
.acell{text-align:center;}
.atimer{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;padding:2px 4px;border-radius:3px;border:1px solid transparent;display:inline-block;min-width:50px;transition:all 0.15s;}
.atimer:hover{border-color:var(--accent);color:var(--accent);}
.atimer.active{color:var(--danger);border-color:#2a1a1a;}
.atimer.ready{color:var(--success);animation:pulse 1s infinite;}
.atimer.none{color:var(--border);cursor:default;}
.atimer.none:hover{border-color:transparent;color:var(--border);}
.atimer.fixed{color:var(--warning);cursor:default;}
.atimer.fixed:hover{border-color:transparent;color:var(--warning);}

.status-bar{display:flex;align-items:center;gap:8px;margin-top:1rem;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:4px;font-size:11px;color:var(--muted);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--success);}
.dot.error{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
</style>
</head>

const ARENA_BOSSES=[
  {name:'Fortune Pouch',      blessMin:10,  vipMin:30 },
  {name:'Soldier',            blessMin:30,  vipMin:30 },
  {name:'Bali 1',             blessMin:60,  vipMin:60 },
  {name:'Bali 2',             blessMin:60,  vipMin:60 },
  {name:'Bali 3',             blessMin:60,  vipMin:60 },
  {name:'Witch Doctor',       blessMin:20,  vipMin:20 },
  {name:'Hammerhead',         blessMin:90,  vipMin:90 },
  {name:'Doomed Knight',      blessMin:180, vipMin:180},
  {name:'Sword Master',       blessMin:270, vipMin:270},
  {name:'Demonic Priest',     blessMin:330, vipMin:330},
  {name:'Cursed Necromancer', blessMin:210, vipMin:210},
  {name:'Queen of the Damned',blessMin:390, vipMin:390},

  {name:'IK 2',               blessMin:240, vipMin:240},

  {name:'IK 6',               blessMin:720, vipMin:780},

  {name:'Descendant',         blessMin:780, vipMin:null},
  {name:'Elite Demon Rider',  blessMin:510, vipMin:null},
  {name:'Asteroth',           blessMin:-1,  vipMin:null,fixed:true,fixedHour:21},
  {name:'Darion',             blessMin:840, vipMin:null},
  {name:'Slaanesh',           blessMin:900, vipMin:null},
  {name:'Erohim',             blessMin:1500,vipMin:null},
];

// Generate IDs from name
function makeId(name,prefix){return prefix+'_'+name.toLowerCase().replace(/[^a-z0-9]/g,'_');}

let state={};
let currentUser='Unknown';
let activityLog=[];

function getSrv(){return new Date(Date.now()+3*3600000);}

function fmt(ms){
  if(ms<=0)return'00:00:00';
  const s=Math.floor(ms/1000);
  return[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(x=>String(x).padStart(2,'0')).join(':');
}
function fmtS(ms){
  if(ms<=0)return'00:00';
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return h>0?[h,m,sec].map(x=>String(x).padStart(2,'0')).join(':'):[m,sec].map(x=>String(x).padStart(2,'0')).join(':');
}
function fmtL(min){
  if(min<0)return'21:00';
  if(min>=60)return(min%60===0?(min/60)+'h':(min/60).toFixed(1)+'h');
  return min+'min';
}

function getFixedMs(h){
  const t=getSrv();
  const now=t.getUTCHours()*3600+t.getUTCMinutes()*60+t.getUTCSeconds();
  let diff=h*3600-now;
  if(diff<=0)diff+=86400;
  return diff*1000;
}

function getNextEv(ev){
  const t=getSrv(),h=t.getUTCHours(),m=t.getUTCMinutes(),s=t.getUTCSeconds();
  const nowMs=h*3600000+m*60000+s*1000;
  let nH;
  if(ev.type==='hourly'){nH=(m<ev.minute||(m===ev.minute&&s===0))?h:h+1;}
  else{const f=ev.parity==='even'?hh=>hh%2===0:hh=>hh%2!==0;let c=h;if(!f(c)||m>ev.minute||(m===ev.minute&&s>0))c++;while(!f(c))c++;nH=c;}
  nH=nH%24;
  let nMs=nH*3600000+ev.minute*60000;
  if(nMs<=nowMs)nMs+=86400000;
  let isOpen=false;
  if(ev.type==='hourly'){const st=h*3600000+ev.minute*60000;isOpen=nowMs>=st&&nowMs<st+ev.duration*60000;}
  else{const f=ev.parity==='even'?hh=>hh%2===0:hh=>hh%2!==0;if(f(h)){const st=h*3600000+ev.minute*60000;isOpen=nowMs>=st&&nowMs<st+ev.duration*60000;}}
  return{msLeft:nMs-nowMs,isOpen};
}

function getBS(id,min){
  if(min<0)return{status:'fixed',left:getFixedMs(21)};
  const s=state[id];if(!s)return{status:'idle',left:0};
  const left=min*60000-(Date.now()-s.startedAt);
  return{status:left>0?'active':'ready',left:Math.max(0,left)};
}

function getNotif(id){return localStorage.getItem(id+'_notif')!=='off';}
function toggleNotif(id){
  const on=getNotif(id);localStorage.setItem(id+'_notif',on?'off':'on');
  const b=document.getElementById(id+'-notif-btn');
  if(b){b.className='notif-btn '+(on?'off':'on');}
}

const MEMBERS=[
  {password:'kabal21',  name:'Kabal',    greeting:'Привет господин'},
  {password:'paramon',  name:'Paramon',  greeting:'ЗДАРОВА ЗАЕБАЛ'},
  {password:'problema', name:'Problema', greeting:'ЛАБРИТ ЕБАТЬ'},
  {password:'junior',   name:'Roland',   greeting:'ПЕРЕЗАГРУЗИ РОУТЕР'},
];

function checkPass(){
  const val=document.getElementById('pass-input').value.trim();
  const member=MEMBERS.find(m=>m.password===val);
  const msg=document.getElementById('modal-msg');
  if(member){
    msg.style.color='#52c878';
    msg.textContent=member.greeting;
    currentUser=member.name;
    unlockAudio();
    setTimeout(()=>{ document.getElementById('modal').style.display='none'; }, 1500);
  } else {
    msg.style.color='#e05252';
    msg.textContent='Доступ запрещён. Иди нахуй.';
    document.getElementById('pass-input').value='';
    document.getElementById('pass-input').focus();
  }
}

let audioUnlocked=false;
function unlockAudio(){
  if(audioUnlocked)return;
  audioUnlocked=true;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const buf=ctx.createBuffer(1,1,22050);
    const src=ctx.createBufferSource();
    src.buffer=buf;src.connect(ctx.destination);src.start(0);
  }catch(e){}
}
document.addEventListener('click',unlockAudio,{once:true});

function playAlert(file){
  try{new Audio(file).play();}catch(e){}
}

const alertFired={bc:false,cc:false,ds:false};

function renderEvents(){
  document.getElementById('eventList').innerHTML=EVENTS.map(ev=>{
    const{msLeft,isOpen}=getNextEv(ev);
    const soon=msLeft<5*60000&&!isOpen;
    const cls=isOpen?'open':soon?'soon':'';
    const hasAlert=['bc','cc','ds'].includes(ev.id);
    const on=hasAlert?getNotif(ev.id):false;
    const nb=hasAlert?`<button id="${ev.id}-notif-btn" class="notif-btn ${on?'on':'off'}" onclick="toggleNotif('${ev.id}')" title="Sound alert">&#9836;</button>`:'';
    return`<div class="ev-item">${nb}<div class="ev-name">${ev.name}</div><div class="ev-timer ${cls}" id="et-${ev.id}">${isOpen?'OPEN':fmt(msLeft)}</div></div>`;
  }).join('');
}

function renderBosses(){
  document.getElementById('bossList').innerHTML=BOSS_GROUPS.map(g=>`
    <div class="bgroup">
      <div class="bgroup-name">${g.name}</div>
      ${g.bosses.map(b=>{
        const{status,left}=getBS(b.id,b.min);
        const txt=status==='idle'?'--:--:--':status==='ready'?'READY':fmt(left);
        return`<div class="bitem ${status}" id="bi-${b.id}" onclick="toggleBoss('${b.id}',${b.min})">
          <div class="bitem-name">${b.name}</div>
          <div style="text-align:right">
            <div class="bitem-timer ${status==='idle'?'':status}" id="bt-${b.id}">${txt}</div>
            <div class="bitem-sub">${fmtL(b.min)}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

function renderArena(){
  document.getElementById('arenaTable').innerHTML=ARENA_BOSSES.map(b=>{
    const bid=makeId(b.name,'a');
    // Bless
    const bl=getBS(bid+'_bl',b.blessMin);
    const blTxt=b.blessMin===null?'—':bl.status==='fixed'?fmtS(bl.left):bl.status==='idle'?fmtL(b.blessMin):bl.status==='ready'?'READY':fmtS(bl.left);
    const blCls=b.blessMin===null?'none':bl.status==='fixed'?'fixed':bl.status==='idle'?'':bl.status;
    const blClick=b.blessMin!==null&&b.blessMin>=0?`onclick="toggleArena('${bid}_bl',${b.blessMin})"`:'' ;
    // VIP cols
    const vipCols=['main','sub1','sub2'].map(loc=>{
      if(b.vipMin===null)return`<td class="acell"><div class="atimer none">—</div></td>`;
      const key=bid+'_'+loc;
      const vs=getBS(key,b.vipMin);
      const txt=vs.status==='idle'?fmtL(b.vipMin):vs.status==='ready'?'READY':fmtS(vs.left);
      const cls=vs.status==='idle'?'':vs.status;
      return`<td class="acell"><div class="atimer ${cls}" id="lt-${key}" onclick="toggleArena('${key}',${b.vipMin})">${txt}</div></td>`;
    }).join('');
    return`<tr>
      <td><div class="aname">${b.name}</div></td>
      <td class="acell"><div class="atimer ${blCls}" id="lt-${bid}_bl" ${blClick}>${blTxt}</div></td>
      ${vipCols}
    </tr>`;
  }).join('');
}

function tickEvents(){
  EVENTS.forEach(ev=>{
    const{msLeft,isOpen}=getNextEv(ev);
    const el=document.getElementById('et-'+ev.id);if(!el)return;
    const soon=msLeft<5*60000&&!isOpen;
    el.textContent=isOpen?'OPEN':fmt(msLeft);
    el.className='ev-timer'+(isOpen?' open':soon?' soon':'');
    if(['bc','cc','ds'].includes(ev.id)&&soon&&!isOpen&&getNotif(ev.id)){
      if(!alertFired[ev.id]){alertFired[ev.id]=true;playAlert(ev.id+'.mp3');}
    } else if(['bc','cc','ds'].includes(ev.id)&&!soon){alertFired[ev.id]=false;}
  });
}

function tickBosses(){
  BOSS_GROUPS.forEach(g=>g.bosses.forEach(b=>{
    const{status,left}=getBS(b.id,b.min);
    const el=document.getElementById('bt-'+b.id),card=document.getElementById('bi-'+b.id);
    if(!el)return;
    el.textContent=status==='idle'?'--:--:--':status==='ready'?'READY':fmt(left);
    el.className='bitem-timer'+(status==='idle'?'':' '+status);
    card.className='bitem '+status;
  }));
}

function tickArena(){
  ARENA_BOSSES.forEach(b=>{
    const bid=makeId(b.name,'a');
    // Bless
    if(b.blessMin!==null){
      const el=document.getElementById('lt-'+bid+'_bl');if(!el)return;
      const s=getBS(bid+'_bl',b.blessMin);
      const isFixed=b.blessMin<0;
      el.textContent=isFixed?fmtS(s.left):s.status==='idle'?fmtL(b.blessMin):s.status==='ready'?'READY':fmtS(s.left);
      el.className='atimer'+(isFixed?' fixed':s.status==='idle'?'':' '+s.status);
    }
    // VIP
    if(b.vipMin!==null){
      ['main','sub1','sub2'].forEach(loc=>{
        const key=bid+'_'+loc;
        const el=document.getElementById('lt-'+key);if(!el)return;
        const s=getBS(key,b.vipMin);
        el.textContent=s.status==='idle'?fmtL(b.vipMin):s.status==='ready'?'READY':fmtS(s.left);
        el.className='atimer'+(s.status==='idle'?'':' '+s.status);
      });
    }
  });
}

async function toggleBoss(id,min){
  const{status}=getBS(id,min);
  const action=status==='active'?'сбросил':'запустил';
  const bossName=BOSS_GROUPS.flatMap(g=>g.bosses).find(b=>b.id===id)?.name||id;
  if(status==='active')delete state[id];else state[id]={startedAt:Date.now()};
  addLog(`${currentUser} — ${action} таймер: ${bossName}`);
  renderBosses();await saveState();
}
async function toggleArena(key,min){
  if(min<0)return;
  const{status}=getBS(key,min);
  const action=status==='active'?'сбросил':'запустил';
  const parts=key.split('_');
  const bossName=ARENA_BOSSES.find(b=>makeId(b.name,'a')===parts.slice(0,-1).join('_'))?.name||key;
  const loc=parts[parts.length-1].toUpperCase();
  if(status==='active')delete state[key];else state[key]={startedAt:Date.now()};
  addLog(`${currentUser} — ${action} таймер: ${bossName} / ${loc}`);
  renderArena();await saveState();
}

function addLog(msg){
  const t=getSrv();
  const time=[t.getUTCHours(),t.getUTCMinutes(),t.getUTCSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
  activityLog.unshift(`[${time}] ${msg}`);
  if(activityLog.length>50)activityLog.pop();
  renderLog();
}

function renderLog(){
  const el=document.getElementById('activityLog');if(!el)return;
  el.innerHTML=activityLog.map(l=>`<div style="padding:3px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);">${l}</div>`).join('');
}

async function loadState(){
  try{
    const r=await fetch(API_URL+'/latest',{headers:{'X-Master-Key':API_KEY}});
    const d=await r.json();
    state=d.record.bosses||{};
    const newLog=d.record.log||[];
    if(JSON.stringify(newLog)!==JSON.stringify(activityLog)){
      activityLog=newLog;renderLog();
    }
    setStatus(true,'Синхронизировано');
  }catch(e){setStatus(false,'Ошибка подключения');}
}
async function saveState(){
  try{
    await fetch(API_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify({bosses:state,log:activityLog})});
    setStatus(true,'Сохранено — '+new Date().toLocaleTimeString('ru-RU'));
  }catch(e){setStatus(false,'Ошибка сохранения');}
}
function setStatus(ok,msg){
  document.getElementById('statusDot').className=ok?'dot':'dot error';
  document.getElementById('statusText').textContent=msg;
}
function updateSrvTime(){
  const t=getSrv();
  document.getElementById('serverTime').textContent=
    [t.getUTCHours(),t.getUTCMinutes(),t.getUTCSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
}

async function init(){
  await loadState();
  renderEvents();renderBosses();renderArena();renderLog();
  setInterval(()=>{updateSrvTime();tickEvents();tickBosses();tickArena();},1000);
  setInterval(async()=>{await loadState();},15000);
}
updateSrvTime();init();
</script>
</body>
</html>
