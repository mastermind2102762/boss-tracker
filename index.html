<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boss Tracker — MuOnline</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --border: #2a2d36;
    --accent: #c8a84b;
    --text: #e8e6e0;
    --muted: #6b6f7a;
    --danger: #e05252;
    --success: #52c878;
    --warning: #e09652;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; padding: 1.5rem 1rem; }

  header { text-align: center; margin-bottom: 1.5rem; }
  .logo { font-size: 11px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-size: 30px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  .divider { width: 50px; height: 2px; background: var(--accent); margin: 10px auto; }
  .server-time { font-family: 'Share Tech Mono', monospace; font-size: 20px; color: var(--accent); letter-spacing: 3px; margin: 4px 0; }

  .layout { display: grid; grid-template-columns: 200px 220px 1fr; gap: 14px; align-items: start; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 12px; }
  .panel-title { font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

  /* EVENTS */
  .event-item { padding: 7px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .event-item:last-child { border-bottom: none; }
  .event-name { font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .event-timer { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--muted); }
  .event-timer.soon { color: var(--warning); }
  .event-timer.open { color: var(--success); animation: pulse 1s infinite; }

  /* BOSSES */
  .boss-group { margin-bottom: 12px; }
  .boss-group:last-child { margin-bottom: 0; }
  .boss-group-name { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .boss-item { padding: 6px 8px; margin-bottom: 4px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: border-color 0.2s; position: relative; overflow: hidden; }
  .boss-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--border); transition: background 0.3s; }
  .boss-item.active::before { background: var(--danger); }
  .boss-item.ready::before { background: var(--success); }
  .boss-item:hover { border-color: var(--accent); }
  .boss-item-name { font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .boss-item-timer { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--muted); }
  .boss-item-timer.active { color: var(--danger); }
  .boss-item-timer.ready { color: var(--success); animation: pulse 1s infinite; }

  /* LOCATIONS TABLE */
  .loc-table { width: 100%; border-collapse: collapse; }
  .loc-table th { font-size: 10px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; padding: 6px 8px; text-align: center; border-bottom: 1px solid var(--border); }
  .loc-table th.boss-col { text-align: left; }
  .loc-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .loc-table tr:last-child td { border-bottom: none; }
  .loc-name { font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .loc-respawn { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  .loc-cell { text-align: center; }
  .loc-timer { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--muted); cursor: pointer; padding: 4px 6px; border-radius: 3px; border: 1px solid transparent; transition: all 0.2s; display: inline-block; min-width: 70px; }
  .loc-timer:hover { border-color: var(--accent); color: var(--accent); }
  .loc-timer.active { color: var(--danger); border-color: #2a1a1a; }
  .loc-timer.ready { color: var(--success); animation: pulse 1s infinite; }

  .status-bar { display: flex; align-items: center; gap: 8px; margin-top: 1rem; padding: 8px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
  .dot.error { background: var(--danger); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
</style>
</head>
<body>
<div style="max-width:1200px;margin:0 auto;">
  <header>
    <div class="logo">Guild Tool</div>
    <h1>Boss Tracker by Kabal</h1>
    <div class="divider"></div>
    <div class="server-time">Server time: <span id="serverTime">--:--:--</span></div>
  </header>

  <div class="layout">
    <!-- EVENTS -->
    <div class="panel">
      <div class="panel-title">Events</div>
      <div id="eventList"></div>
    </div>

    <!-- BOSSES -->
    <div class="panel">
      <div class="panel-title">Bosses</div>
      <div id="bossList"></div>
    </div>

    <!-- LOCATIONS -->
    <div class="panel">
      <div class="panel-title">VIP Arena</div>
      <table class="loc-table">
        <thead>
          <tr>
            <th class="boss-col">Boss</th>
            <th>Main</th>
            <th>Sub1</th>
            <th>Sub2</th>
          </tr>
        </thead>
        <tbody id="locTable"></tbody>
      </table>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Подключение...</span>
  </div>
</div>

<script>
const BIN_ID = '69d30e0daaba882197ca5cb3';
const API_KEY = '$2a$10$WcKd4x3jXZjYMOxP1NI0Auul5aZm1mP0VA63W5WAw2pUK3IpfSZz6';
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const EVENTS = [
  { id: 'bc',  name: 'Blood Castle',   type: 'hourly',    minute: 25, duration: 15 },
  { id: 'cc',  name: 'Chaos Castle',   type: 'alternate', minute: 55, duration: 10, parity: 'even' },
  { id: 'ds',  name: 'Devil Square',   type: 'alternate', minute: 55, duration: 10, parity: 'odd'  },
  { id: 'rb',  name: 'Rabbits',        type: 'hourly',    minute: 0,  duration: 10 },
  { id: 'ww',  name: 'White Wizards',  type: 'hourly',    minute: 30, duration: 10 },
  { id: 'gd',  name: 'Golden Dragons', type: 'hourly',    minute: 0,  duration: 10 },
  { id: 'rd',  name: 'Red Dragons',    type: 'hourly',    minute: 0,  duration: 10 },
  { id: 'hh',  name: 'Happy Hour',     type: 'hourly',    minute: 0,  duration: 60 },
  { id: 'tdm', name: 'Team Deathmatch',type: 'hourly',    minute: 0,  duration: 30 },
];

const BOSS_GROUPS = [
  {
    name: 'Zaikan Tarkan',
    bosses: [
      { id: 'zaikan_tarkan_main', name: 'Main',  hours: 5 },
      { id: 'zaikan_tarkan_sub1', name: 'Sub1',  hours: 5 },
      { id: 'zaikan_tarkan_sub2', name: 'Sub2',  hours: 5 },
    ]
  },
  {
    name: 'Zaikan Lorencia',
    bosses: [
      { id: 'zaikan_lor', name: 'Lorencia', hours: 5 },
    ]
  },
  {
    name: 'Dark Elf',
    bosses: [
      { id: 'dark_elf', name: 'Dark Elf', hours: 1 },
    ]
  },
];

const VIP_BOSSES = [
  { id: 'fortune_pouch', name: 'Fortune Pouch', respawnMin: 30 },
  { id: 'soldier',       name: 'Soldier',       respawnMin: 30 },
  { id: 'hammer_head',   name: 'Hammer Head',   respawnMin: 240 },
];
const VIP_LOCS = ['main', 'sub1', 'sub2'];

let state = {};

function getServerTime() {
  return new Date(Date.now() + 3 * 3600 * 1000);
}

function fmt(ms) {
  if (ms <= 0) return '00:00:00';
  const s = Math.floor(ms / 1000);
  return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(x=>String(x).padStart(2,'0')).join(':');
}

function fmtMin(ms) {
  if (ms <= 0) return '00:00';
  const s = Math.floor(ms / 1000);
  return [Math.floor(s/60), s%60].map(x=>String(x).padStart(2,'0')).join(':');
}

function getNextEvent(ev) {
  const t = getServerTime();
  const h = t.getUTCHours(), m = t.getUTCMinutes(), s = t.getUTCSeconds();
  const nowMs = h*3600000 + m*60000 + s*1000;
  let nextH;
  if (ev.type === 'hourly') {
    nextH = m < ev.minute || (m === ev.minute && s === 0) ? h : h + 1;
  } else {
    const match = ev.parity === 'even' ? hh=>hh%2===0 : hh=>hh%2!==0;
    let c = h;
    if (!match(c) || m > ev.minute || (m === ev.minute && s > 0)) c++;
    while (!match(c)) c++;
    nextH = c;
  }
  nextH = nextH % 24;
  let nextMs = nextH*3600000 + ev.minute*60000;
  if (nextMs <= nowMs) nextMs += 86400000;
  const msLeft = nextMs - nowMs;
  let isOpen = false;
  if (ev.type === 'hourly') {
    const st = h*3600000 + ev.minute*60000;
    isOpen = nowMs >= st && nowMs < st + ev.duration*60000;
  } else {
    const match = ev.parity === 'even' ? hh=>hh%2===0 : hh=>hh%2!==0;
    if (match(h)) { const st = h*3600000 + ev.minute*60000; isOpen = nowMs >= st && nowMs < st + ev.duration*60000; }
  }
  return { msLeft, isOpen };
}

function renderEvents() {
  document.getElementById('eventList').innerHTML = EVENTS.map(ev => {
    const { msLeft, isOpen } = getNextEvent(ev);
    const soon = msLeft < 5*60000 && !isOpen;
    const cls = isOpen ? 'open' : soon ? 'soon' : '';
    const txt = isOpen ? 'OPEN' : fmt(msLeft);
    return `<div class="event-item">
      <div class="event-name">${ev.name}</div>
      <div class="event-timer ${cls}" id="et-${ev.id}">${txt}</div>
    </div>`;
  }).join('');
}

function tickEvents() {
  EVENTS.forEach(ev => {
    const { msLeft, isOpen } = getNextEvent(ev);
    const el = document.getElementById('et-' + ev.id);
    if (!el) return;
    const soon = msLeft < 5*60000 && !isOpen;
    el.textContent = isOpen ? 'OPEN' : fmt(msLeft);
    el.className = 'event-timer' + (isOpen ? ' open' : soon ? ' soon' : '');
  });
}

function renderBosses() {
  document.getElementById('bossList').innerHTML = BOSS_GROUPS.map(g => `
    <div class="boss-group">
      <div class="boss-group-name">${g.name}</div>
      ${g.bosses.map(b => {
        const s = state[b.id];
        const elapsed = s ? Date.now() - s.startedAt : null;
        const total = b.hours * 3600000;
        const left = elapsed !== null ? total - elapsed : null;
        const status = left === null ? 'idle' : left > 0 ? 'active' : 'ready';
        const txt = status === 'idle' ? '--:--:--' : status === 'ready' ? 'READY' : fmt(left);
        return `<div class="boss-item ${status}" id="bi-${b.id}" onclick="toggleBoss('${b.id}', ${b.hours})">
          <div class="boss-item-name">${b.name}</div>
          <div class="boss-item-timer ${status === 'idle' ? '' : status}" id="bt-${b.id}">${txt}</div>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

function renderLocTable() {
  document.getElementById('locTable').innerHTML = VIP_BOSSES.map(b => `
    <tr>
      <td>
        <div class="loc-name">${b.name}</div>
        <div class="loc-respawn">${b.respawnMin >= 60 ? (b.respawnMin/60)+'h' : b.respawnMin+'min'}</div>
      </td>
      ${VIP_LOCS.map(loc => {
        const key = b.id + '_' + loc;
        const s = state[key];
        const elapsed = s ? Date.now() - s.startedAt : null;
        const total = b.respawnMin * 60000;
        const left = elapsed !== null ? total - elapsed : null;
        const status = left === null ? 'idle' : left > 0 ? 'active' : 'ready';
        const txt = status === 'idle' ? '——' : status === 'ready' ? 'READY' : fmtMin(left);
        return `<td class="loc-cell">
          <div class="loc-timer ${status === 'idle' ? '' : status}" id="lt-${key}" onclick="toggleLoc('${b.id}', '${loc}', ${b.respawnMin})">${txt}</div>
        </td>`;
      }).join('')}
    </tr>
  `).join('');
}

function tickBosses() {
  BOSS_GROUPS.forEach(g => g.bosses.forEach(b => {
    const s = state[b.id];
    const el = document.getElementById('bt-' + b.id);
    const card = document.getElementById('bi-' + b.id);
    if (!el) return;
    const elapsed = s ? Date.now() - s.startedAt : null;
    const left = elapsed !== null ? b.hours*3600000 - elapsed : null;
    const status = left === null ? 'idle' : left > 0 ? 'active' : 'ready';
    el.textContent = status === 'idle' ? '--:--:--' : status === 'ready' ? 'READY' : fmt(left);
    el.className = 'boss-item-timer' + (status === 'idle' ? '' : ' ' + status);
    card.className = 'boss-item ' + status;
  }));
}

function tickLoc() {
  VIP_BOSSES.forEach(b => VIP_LOCS.forEach(loc => {
    const key = b.id + '_' + loc;
    const s = state[key];
    const el = document.getElementById('lt-' + key);
    if (!el) return;
    const elapsed = s ? Date.now() - s.startedAt : null;
    const left = elapsed !== null ? b.respawnMin*60000 - elapsed : null;
    const status = left === null ? 'idle' : left > 0 ? 'active' : 'ready';
    el.textContent = status === 'idle' ? '——' : status === 'ready' ? 'READY' : fmtMin(left);
    el.className = 'loc-timer' + (status === 'idle' ? '' : ' ' + status);
  }));
}

async function toggleBoss(id, hours) {
  const s = state[id];
  const elapsed = s ? Date.now() - s.startedAt : null;
  const active = elapsed !== null && hours*3600000 - elapsed > 0;
  if (active) delete state[id]; else state[id] = { startedAt: Date.now() };
  renderBosses();
  await saveState();
}

async function toggleLoc(bossId, loc, respawnMin) {
  const key = bossId + '_' + loc;
  const s = state[key];
  const elapsed = s ? Date.now() - s.startedAt : null;
  const active = elapsed !== null && respawnMin*60000 - elapsed > 0;
  if (active) delete state[key]; else state[key] = { startedAt: Date.now() };
  renderLocTable();
  await saveState();
}

async function loadState() {
  try {
    const r = await fetch(API_URL + '/latest', { headers: { 'X-Master-Key': API_KEY } });
    const data = await r.json();
    state = data.record.bosses || {};
    setStatus(true, 'Синхронизировано');
  } catch(e) { setStatus(false, 'Ошибка подключения'); }
}

async function saveState() {
  try {
    await fetch(API_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify({ bosses: state })
    });
    setStatus(true, 'Сохранено — ' + new Date().toLocaleTimeString('ru-RU'));
  } catch(e) { setStatus(false, 'Ошибка сохранения'); }
}

function setStatus(ok, msg) {
  document.getElementById('statusDot').className = ok ? 'dot' : 'dot error';
  document.getElementById('statusText').textContent = msg;
}

function updateServerTime() {
  const t = getServerTime();
  const h = String(t.getUTCHours()).padStart(2,'0');
  const m = String(t.getUTCMinutes()).padStart(2,'0');
  const s = String(t.getUTCSeconds()).padStart(2,'0');
  document.getElementById('serverTime').textContent = h+':'+m+':'+s;
}

async function init() {
  await loadState();
  renderEvents();
  renderBosses();
  renderLocTable();
  setInterval(() => { updateServerTime(); tickEvents(); tickBosses(); tickLoc(); }, 1000);
  setInterval(async () => { await loadState(); }, 15000);
}

updateServerTime();
init();
</script>
</body>
</html>
